api:
  dashboard: true
  insecure: true

entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: bitly-network

log:
  level: INFO
  format: json

accessLog:
  format: json
  fields:
    defaultMode: keep
    headers:
      defaultMode: drop
      names:
        User-Agent: keep
        X-Forwarded-For: keep

http:
  middlewares:
    cors:
      headers:
        accessControlAllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        accessControlAllowHeaders:
          - Content-Type
          - Authorization
        accessControlAllowOriginList:
          - "http://localhost"
          - "http://localhost:3000"
        accessControlMaxAge: 100
        addVaryHeader: true
    
    rate-limit:
      rateLimit:
        average: 100
        burst: 50
        period: 1s
    
    redirect-rate-limit:
      rateLimit:
        average: 1000
        burst: 200
        period: 1s
