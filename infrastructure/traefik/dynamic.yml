http:
  routers:
    # Redirect HTTP to HTTPS
    frontend-http:
      rule: "Host(`thelittleurl.com`) || Host(`www.thelittleurl.com`)"
      entryPoints:
        - web
      middlewares:
        - redirect-to-https
    # Serve site over HTTPS with Let's Encrypt cert
    frontend-https:
      rule: "Host(`thelittleurl.com`) || Host(`www.thelittleurl.com`)"
      entryPoints:
        - websecure
      service: frontend
      tls:
        certResolver: letsencrypt

  middlewares:
    redirect-to-https:
      redirectScheme:
        scheme: https
        permanent: true

  services:
    frontend:
      loadBalancer:
        servers:
          - url: "http://bitly-frontend:3000"

