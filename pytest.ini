[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts = -v --tb=short
markers =
    asyncio: mark test as async
    e2e: mark test as end-to-end (requires browser)
    integration: mark test as integration (requires services)
filterwarnings =
    ignore::DeprecationWarning
